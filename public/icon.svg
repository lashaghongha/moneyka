<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="100%" stop-color="#0a1a0e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF82"/>
      <stop offset="100%" stop-color="#2d8f5a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="#4CAF82" stroke-width="6" opacity="0.18"/>

  <!-- ₾ symbol -->
  <text
    x="256" y="325"
    font-size="285"
    text-anchor="middle"
    fill="url(#glow)"
    font-family="'Georgia','Times New Roman',serif"
    font-weight="bold"
  >₾</text>

  <!-- MoneyKa dot accent -->
  <circle cx="390" cy="140" r="22" fill="#4CAF82" opacity="0.7"/>
</svg>
