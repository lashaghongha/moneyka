<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2a1c"/>
      <stop offset="100%" stop-color="#050d08"/>
    </linearGradient>

    <!-- Wide soft glow — pushed lower so it frames the symbol, not washes it -->
    <radialGradient id="glow" cx="50%" cy="72%" r="55%">
      <stop offset="0%"   stop-color="#4CAF82" stop-opacity="0.28"/>
      <stop offset="55%"  stop-color="#4CAF82" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4CAF82" stop-opacity="0"/>
    </radialGradient>

    <!-- Top-edge glow — gives a halo around the top of the symbol -->
    <radialGradient id="glowTop" cx="50%" cy="28%" r="40%">
      <stop offset="0%"   stop-color="#4CAF82" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#4CAF82" stop-opacity="0"/>
    </radialGradient>

    <!-- Symbol fill: bright white-mint at top fading to vivid green -->
    <linearGradient id="sym" x1="0.3" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="#EAFFF5"/>
      <stop offset="35%"  stop-color="#6DFFB8"/>
      <stop offset="100%" stop-color="#26a05e"/>
    </linearGradient>

    <!-- Glow bloom on the ₾ itself — tight, not washed out -->
    <filter id="bloom" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feFlood flood-color="#4CAF82" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Bottom glow layer — follows symbol position -->
  <ellipse cx="256" cy="390" rx="240" ry="170" fill="url(#glow)"/>
  <!-- Top glow layer -->
  <ellipse cx="256" cy="130" rx="200" ry="140" fill="url(#glowTop)"/>

  <!-- Very subtle ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#4CAF82" stroke-width="1.5" stroke-opacity="0.10"/>

  <!-- ₾ symbol — centered visually (baseline 358 = visual center ~258) -->
  <text
    x="256" y="358"
    font-size="300"
    text-anchor="middle"
    fill="url(#sym)"
    filter="url(#bloom)"
    font-family="'Georgia','Times New Roman',serif"
    font-weight="bold"
  >₾</text>

  <!-- Accent spark top-right -->
  <circle cx="384" cy="134" r="9"  fill="#8FFFD6" opacity="0.6"/>
  <circle cx="384" cy="134" r="17" fill="none" stroke="#8FFFD6" stroke-width="1.5" opacity="0.2"/>
</svg>
