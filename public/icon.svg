<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2a1c"/>
      <stop offset="100%" stop-color="#050d08"/>
    </linearGradient>

    <!-- Outer ambient glow behind the symbol -->
    <radialGradient id="glow1" cx="50%" cy="54%" r="48%">
      <stop offset="0%"   stop-color="#4CAF82" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#4CAF82" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4CAF82" stop-opacity="0"/>
    </radialGradient>

    <!-- Tight inner glow (hot-spot) -->
    <radialGradient id="glow2" cx="50%" cy="50%" r="35%">
      <stop offset="0%"   stop-color="#9FFFD0" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#9FFFD0" stop-opacity="0"/>
    </radialGradient>

    <!-- Symbol gradient — bright mint → deep green -->
    <linearGradient id="sym" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%"   stop-color="#A8FFD8"/>
      <stop offset="40%"  stop-color="#4CAF82"/>
      <stop offset="100%" stop-color="#1d7a48"/>
    </linearGradient>

    <!-- Subtle drop-shadow filter on the ₾ -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#4CAF82" flood-opacity="0.6"/>
    </filter>

    <!-- Noise texture for depth -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Very subtle noise overlay for texture -->
  <rect width="512" height="512" rx="112" fill="#ffffff" opacity="0.015" filter="url(#noise)"/>

  <!-- Ambient glow layer -->
  <ellipse cx="256" cy="276" rx="220" ry="200" fill="url(#glow1)"/>

  <!-- Hot-spot glow -->
  <ellipse cx="256" cy="256" rx="130" ry="120" fill="url(#glow2)"/>

  <!-- Thin decorative ring — very subtle -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#4CAF82" stroke-width="1.5" stroke-opacity="0.12"/>
  <circle cx="256" cy="256" r="188" fill="none" stroke="#4CAF82" stroke-width="1"   stroke-opacity="0.07"/>

  <!-- ₾ symbol -->
  <text
    x="256" y="336"
    font-size="300"
    text-anchor="middle"
    fill="url(#sym)"
    filter="url(#shadow)"
    font-family="'Georgia','Times New Roman',serif"
    font-weight="bold"
  >₾</text>

  <!-- Small accent spark top-right -->
  <circle cx="388" cy="132" r="10" fill="#7FFFC0" opacity="0.55"/>
  <circle cx="388" cy="132" r="18" fill="none" stroke="#7FFFC0" stroke-width="1.5" opacity="0.18"/>
</svg>
